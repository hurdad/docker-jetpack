name: Build Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/jetpack

# 2x2 matrix:
#   arch:    x86  (linux/amd64)  |  arm64  (linux/arm64)
#   variant: cpu  (ubuntu:24.04) |  cuda   (nvidia base)
#
# Resulting images (dev + runtime each):
#   jetpack-x86-cpu-{dev,runtime}
#   jetpack-x86-cuda-{dev,runtime}
#   jetpack-arm64-cpu-{dev,runtime}
#   jetpack-arm64-cuda-{dev,runtime}

jobs:
  test:
    name: Test (${{ matrix.variant.name }})
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: x86-cpu
            dockerfile: Dockerfile
            platform: linux/amd64
            runner: '["ubuntu-latest"]'
            build_args: ARROW_SIMD_LEVEL=AVX2
          - name: x86-cuda
            dockerfile: Dockerfile.cuda
            platform: linux/amd64
            runner: '["ubuntu-latest"]'
          - name: arm64-cpu
            dockerfile: Dockerfile
            platform: linux/arm64
            runner: '["self-hosted","jetson6"]'
            build_args: ARROW_SIMD_LEVEL=NEON
          - name: arm64-cuda
            dockerfile: Dockerfile.l4tcuda
            platform: linux/arm64
            runner: '["self-hosted","jetson6"]'

    runs-on: ${{ fromJSON(matrix.variant.runner) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.variant.platform }}
          target: test
          push: false
          build-args: ${{ matrix.variant.build_args }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}-${{ matrix.variant.name }}-runtime:buildcache
          cache-to: >-
            ${{ github.event_name != 'pull_request' &&
                format('type=registry,ref={0}-{1}-runtime:buildcache,mode=max',
                       env.IMAGE_BASE, matrix.variant.name) || '' }}

  build:
    name: Build (${{ matrix.variant.name }}, ${{ matrix.target.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: x86-cpu
            dockerfile: Dockerfile
            platform: linux/amd64
            runner: '["ubuntu-latest"]'
            build_args: ARROW_SIMD_LEVEL=AVX2
          - name: x86-cuda
            dockerfile: Dockerfile.cuda
            platform: linux/amd64
            runner: '["ubuntu-latest"]'
          - name: arm64-cpu
            dockerfile: Dockerfile
            platform: linux/arm64
            runner: '["self-hosted","jetson6"]'
            build_args: ARROW_SIMD_LEVEL=NEON
          - name: arm64-cuda
            dockerfile: Dockerfile.l4tcuda
            platform: linux/arm64
            runner: '["self-hosted","jetson6"]'
        target:
          - name: dev
            suffix: -dev
          - name: runtime
            suffix: -runtime

    runs-on: ${{ fromJSON(matrix.variant.runner) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-${{ matrix.variant.name }}${{ matrix.target.suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.variant.platform }}
          target: ${{ matrix.target.name }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.variant.build_args }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}-${{ matrix.variant.name }}${{ matrix.target.suffix }}:buildcache
          cache-to: >-
            ${{ github.event_name != 'pull_request' &&
                format('type=registry,ref={0}-{1}{2}:buildcache,mode=max',
                       env.IMAGE_BASE, matrix.variant.name, matrix.target.suffix) || '' }}
